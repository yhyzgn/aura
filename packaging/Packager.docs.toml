# Aura Docs packager metadata.
# Consumed by future `cargo-packager` integration through `cargo xtask package`.

[application]
id = "dev.aura.Docs"
name = "Aura Docs"
binary = "aura-docs"
package = "aura-docs"
category = "Documentation"
